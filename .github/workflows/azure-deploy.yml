name: Build and Deploy to Azure Web App
permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.x
  NODE_VERSION: '25.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: src/expiry-keeper-web/pnpm-lock.yaml

      - name: Build Vue frontend
        working-directory: src/expiry-keeper-web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Copy Vue dist to wwwroot
        run: |
          mkdir -p src/ExpiryKeeper.Api/wwwroot
          cp -r src/expiry-keeper-web/dist/. src/ExpiryKeeper.Api/wwwroot/

      - name: Publish .NET app
        run: dotnet publish src/ExpiryKeeper.Api/ExpiryKeeper.Api.csproj -c Release -o ./publish

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./publish
